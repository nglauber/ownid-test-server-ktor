<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo WebView e TWA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #1a531a 0%, #000000 100%);
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 310px;
        }
        .btn {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: background 0.2s;
            width: 100%;
        }
        .btn-green {
            background-color: #28a745;
        }
        .btn-green:hover {
            background-color: #218838;
        }
        .btn-blue {
            background-color: #007bff;
        }
        .btn-blue:hover {
            background-color: #0056b3;
        }
        .status-text {
            margin-top: 10px;
            font-size: 14px;
            color: #d1d1d1;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- BOTÃO 1: Formato WebView Tradicional -->
    <button class="btn btn-green" onclick="onNativeCall()">Chamar via WebView Bridge</button>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 10px 0;">

    <!-- BOTÃO 2: Formato TWA / Custom Tabs (postMessage) com mensagem fixa -->
    <button class="btn btn-blue" onclick="onSendMessage()">Enviar via TWA (postMessage)</button>

    <div id="status" class="status-text">Aguardando carregamento...</div>
</div>

<script>
    // Função executada ao carregar a página
    function onReady() {
        const statusDiv = document.getElementById("status");
        if (!statusDiv) return;

        if (typeof window.UnicoSDKSInterface !== 'undefined' && window.UnicoSDKSInterface !== null) {
            statusDiv.innerText = "Status: Modo WebView Detectado";
            statusDiv.style.color = "#28a745";
        } else {
            statusDiv.innerText = "Status: Modo TWA / Navegador Comum";
            statusDiv.style.color = "#007bff";
        }
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", onReady);
    } else {
        onReady();
    }

    // [MÉTODO 1] Comunicação via WebView Bridge
    function onNativeCall() {
        if (typeof window.UnicoSDKSInterface !== 'undefined' && window.UnicoSDKSInterface !== null) {
            window.UnicoSDKSInterface.nomeDoMetodoNoKotlin("Chamada via interface injetada do WebView");
        } else {
            alert("Interface do WebView não encontrada.");
        }
    }

    // [MÉTODO 2] Comunicação via TWA (postMessage) - Mensagem Fixa
    function onSendMessage() {
        // Forma 1: Envia para quem abriu a janela (Muito comum em fluxos de Custom Tabs/TWA)
        if (window.location.origin) {
            const mensagemFixa = "Disparado via TWA postMessage 1";
            window.postMessage(mensagemFixa, window.location.origin);

            console.log("Enviado via window.location.origin.");

        } else if (window.opener) {
            const mensagemFixa = "Disparado via TWA postMessage 2";
            window.opener.postMessage(mensagemFixa, "*");
            console.log("Enviado via window.opener");

        } else {
            const mensagemFixa = "Disparado via TWA postMessage 3";
            // Forma 2: Envia para o próprio window (O padrão que o Chrome do TWA escuta)
            window.postMessage(mensagemFixa, "*");
            console.log("Enviado via window.postMessage padrão");

            // Nota: Mudamos o segundo parâmetro para "*" para evitar que qualquer divergência
            // de porta ou protocolo (http vs https) bloqueie a mensagem no teste.
        }
    }
</script>

</body>
</html>
